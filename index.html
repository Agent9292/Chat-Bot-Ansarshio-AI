<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ansar Shio AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Ansar Shio AI</h1>
            <p>Powered by Backendless</p>
        </div>

        <div class="chat-container" id="chatContainer"></div>

        <div class="input-area">
            <input type="text" id="userInput" class="input-field" placeholder="Ask anything..." autocomplete="off">
            <button id="sendBtn" class="send-btn">Send</button>
            <button id="clearBtn" class="clear-btn">New Chat</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
